[pytest]
DJANGO_SETTINGS_MODULE = ecg_system.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
pythonpath = .
addopts =
    --strict-markers
    --tb=short
    -v

markers =
    slow: mark test as slow (run with -m slow)
    integration: mark as integration test
